<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pedagogik Mahorat - Test</title>
<style>
:root{--gr:#1a7a4a;--grl:#e8f5ee;--grd:#155e38;--rd:#c0392b;--rdl:#fdf0ef;--gy:#f4f5f7;--br:#dde1e7;--tx:#1a1d23;--mt:#6b7280;--wh:#fff;--r:12px;--sh:0 2px 12px rgba(0,0,0,.08)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f8;color:var(--tx);min-height:100vh}
.sc{display:none}.sc.on{display:block}
#home{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.logo{width:72px;height:72px;background:var(--gr);border-radius:20px;display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:36px}
h1{font-size:clamp(20px,4vw,28px);font-weight:700;text-align:center;margin-bottom:6px}
.sub{color:var(--mt);text-align:center;margin-bottom:1.5rem;font-size:14px}
.card{background:var(--wh);border-radius:var(--r);box-shadow:var(--sh);padding:1.5rem;width:100%;max-width:480px;margin-bottom:1rem}
.card h3{font-size:11px;font-weight:600;margin-bottom:.75rem;color:var(--mt);text-transform:uppercase;letter-spacing:.5px}
.pills{display:flex;gap:8px;flex-wrap:wrap}
.pill{padding:7px 14px;border-radius:50px;border:2px solid var(--br);background:var(--wh);font-size:13px;cursor:pointer;font-weight:500}
.pill.on{border-color:var(--gr);background:var(--grl);color:var(--gr)}
.sgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px}
.sbox{background:var(--gy);border-radius:8px;padding:12px;text-align:center}
.sbox .n{font-size:22px;font-weight:700;color:var(--gr)}
.sbox .l{font-size:12px;color:var(--mt);margin-top:2px}
.sbtn{width:100%;max-width:480px;padding:15px;background:var(--gr);color:#fff;border:none;border-radius:var(--r);font-size:16px;font-weight:700;cursor:pointer}
.sbtn:hover{background:var(--grd)}.sbtn:active{transform:scale(.98)}
#quiz{min-height:100vh;display:flex;flex-direction:column}
.qh{background:var(--wh);border-bottom:1px solid var(--br);padding:12px 16px;display:flex;align-items:center;gap:12px;position:sticky;top:0;z-index:10}
.bb{width:34px;height:34px;border:1.5px solid var(--br);border-radius:8px;background:var(--wh);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.bb:hover{background:var(--gy)}
.pw{flex:1}
.pl{font-size:12px;color:var(--mt);margin-bottom:4px}
.pb{height:5px;background:var(--br);border-radius:3px;overflow:hidden}
.pf{height:100%;background:var(--gr);border-radius:3px;transition:width .3s}
.sb{background:var(--grl);color:var(--gr);font-weight:700;font-size:13px;padding:5px 11px;border-radius:20px;flex-shrink:0}
.qb{flex:1;padding:18px 16px;max-width:680px;margin:0 auto;width:100%}
.qn{font-size:12px;color:var(--mt);margin-bottom:6px;font-weight:600}
.qt{font-size:clamp(14px,2.5vw,17px);font-weight:700;line-height:1.5;margin-bottom:18px;background:var(--wh);padding:14px 18px;border-radius:var(--r);border:1px solid var(--br)}
.os{display:flex;flex-direction:column;gap:9px}
.opt{display:flex;align-items:flex-start;gap:11px;padding:12px 15px;border-radius:var(--r);border:2px solid var(--br);background:var(--wh);cursor:pointer;text-align:left;width:100%;font-size:14px;line-height:1.4}
.opt:hover:not([disabled]){border-color:var(--gr);background:var(--grl)}
.lt{width:26px;height:26px;border-radius:50%;border:2px solid var(--br);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px;flex-shrink:0}
.opt:hover:not([disabled]) .lt{border-color:var(--gr);color:var(--gr)}
.opt.ok{border-color:var(--gr)!important;background:var(--grl)!important}
.opt.ok .lt{background:var(--gr);border-color:var(--gr);color:#fff}
.opt.no{border-color:var(--rd)!important;background:var(--rdl)!important}
.opt.no .lt{background:var(--rd);border-color:var(--rd);color:#fff}
.fb{margin-top:12px;padding:11px 15px;border-radius:10px;font-size:13px;font-weight:500;line-height:1.5}
.fb.ok{background:var(--grl);color:#155e38;border:1px solid #a8d5bc}
.fb.no{background:var(--rdl);color:#922b21;border:1px solid #f1a69e}
.nb{margin-top:14px;width:100%;padding:13px;background:var(--gr);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer;display:none}
.nb:hover{background:var(--grd)}.nb.on{display:block}
#res{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem 1rem}
.rc{background:var(--wh);border-radius:20px;box-shadow:var(--sh);padding:2rem 1.5rem;max-width:460px;width:100%;text-align:center}
.ci{width:120px;height:120px;border-radius:50%;background:var(--grl);border:4px solid var(--gr);display:flex;flex-direction:column;align-items:center;justify-content:center;margin:0 auto 1.25rem}
.ci .p{font-size:32px;font-weight:800;color:var(--gr)}
.ci .s{font-size:12px;color:var(--mt)}
.rt{font-size:20px;font-weight:800;margin-bottom:6px}
.rd2{color:var(--mt);font-size:14px;margin-bottom:1.5rem}
.rsgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;margin-bottom:1.5rem}
.rv{background:var(--gy);border-radius:10px;padding:12px 6px}
.rv .n{font-size:20px;font-weight:800}
.rv .g{color:var(--gr)}.rv .r{color:var(--rd)}.rv .b{color:#2563eb}
.rv .l{font-size:11px;color:var(--mt);margin-top:2px}
.brow{display:flex;flex-direction:column;gap:9px}
.b1{padding:13px;background:var(--gr);color:#fff;border:none;border-radius:var(--r);font-size:15px;font-weight:700;cursor:pointer}
.b1:hover{background:var(--grd)}
.b2{padding:13px;background:var(--gy);color:var(--tx);border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer}
.b2:hover{background:var(--br)}
@media(max-width:480px){.qb{padding:12px 10px}.opt{padding:10px 12px;font-size:13px}.qt{font-size:14px;padding:12px 14px}}
</style>
</head>

<script id="qdata" type="application/json">[{"n": 1, "q": "Pedagogik mahorat \u2013 bu\u2026", "opts": ["O\u2018qituvchi tomonidan pedagogik jarayonni takomillashtirish, optimallashtirish omilidir", "Muayyan loyiha asosida tashkil etiladigan, aniq maqsadga yo\u2018naltirilgan pedagogik faoliyat jarayonining mazmunidir", "Didaktik hamda tarbiyaviy jarayonning o\u2018qituvchi tomonidan samarali, mahoratli tarzda tashkil etishdir", "Ta\u2019lim va tarbiyaviy faoliyatda yuqori darajaga erishish va uni doimiy takomillashtirib borish faoliyatidir"], "a": 3}, {"n": 2, "q": "Pedagogik mahoratga to\u2018g\u2018ri tavsif berilgan javobni belgilang ?", "opts": ["So\u2018nggi axborot texnologiyalari va zamonaviy bilimlar bilan qurollangan bo\u2018lishi", "O\u2018z kasbiy bilimlarini, ko\u2018nikma va malakalarni doimiy rivojlantirib borish", "O\u2018qituvchining shaxsiy va kasbiy fazilatlarini rivojlantirishni belgilovchi xususiyatlar", "Pedagogik- psixologik bilimlarni mukammal egallash"], "a": 2}, {"n": 3, "q": "Antik davr mutaffakkirlari-dan kimlar pedagogning kasb mahorati va no-tiqlik san\u2019ati haqida fikr bildirganlar ?", "opts": ["Aristotel, Gegel, Isey", "Farg\u2018oniy, Isokrad, Giperid", "Titseron, Esxil, Forobiy", "Suqrot, Platon, Demosfen"], "a": 3}, {"n": 4, "q": "Mahoratli pedagog bo\u2018lish uchun o\u2018qituvchi o\u2018zining qanday xususiyatlari ustida ko\u2018proq   shug\u2018ullanishi kerak ?", "opts": ["Odobi, mehnati, bilimi, fidoiyligi", "Talaffuzi, bilimi, muomalasi", "His-tuyg\u2018usi, bilimi, nutqi, hatti \u2013 harakati, odobi", "Nutq madaniyatiga doir bilimlar"], "a": 2}, {"n": 5, "q": "Pedagogik mahorat-ning rivojlanish jarayonining beshta elementdan iborat tizimi berilgan qatorni ko\u2018rsating", "opts": ["O\u2018z-o\u2018zini bilish, o\u2018z-o\u2018zini belgilash, o\u2018z-o\u2018zini nazorat qilish", "O\u2018z-o\u2018zini anglash, o\u2018z-o\u2018zini rivojlantirish, o\u2018z-o\u2018zini nazorat qilish", "O\u2018z-o\u2018zini belgilash, o\u2018z-o\u2018zini rivojlantirish, o\u2018z-o\u2018zini nazorat qilish", "O\u2018z-o\u2018zini bilish, o\u2018z-o\u2018zini anglash, o\u2018z-o\u2018zini belgilash, o\u2018z-o\u2018zini rivojlantirish, o\u2018z-o\u2018zini nazorat qilish"], "a": 3}, {"n": 6, "q": "\u201cO\u2018z kasbining mohir ustasi bo\u2018lgan, yuksak darajada madaniyatli, o\u2018z fanini chuqur biladigan, yondosh fanlar sohalarini yaxshi tahlil eta oladigan, tarbiya-lash va o\u2018qitish uslubiyatini mukammal egallagan mutaxassis\u201d bu... (Ped.ensikl.)", "opts": ["Kreativ pedagog", "Novator pedagog", "Kompetentli pedagog", "Mahoratli pedagog"], "a": 3}, {"n": 7, "q": "Individual pedagogik texnika o\u2018qituvchining qanday xususiyatlariga bog\u2018liq?", "opts": ["O\u2018qituvchining ichki xususiyat lariga bog\u2018liq", "Kommunikativ, psixologik, fiziologik xususiyatlariga bog\u2018liq.", "O\u2018qituvchining yoshi, jinsi, mijozi, fe\u2019l-atvori, salomatligi kabi xususiyatlariga bog\u2018liq.", "O\u2018qituvchining mijoziga bog\u2018liq"], "a": 2}, {"n": 8, "q": "O\u2018quvchilar qalbiga yo\u2018l topa olish, ularning mehrini qozonishga qara-tilgan o\u2018qituvchi-ning pedagogik qobiliyati...", "opts": ["O\u2018qituvchining pedagogik kompetentligi", "O\u2018qituvchining pedagogik improvizatorligi", "O\u2018qituvchining pedagogik mahoratidir", "O\u2018qituvchining pedagogik kreativligi"], "a": 2}, {"n": 9, "q": "O\u2018z fikrlarini, kayfiyatini, ho-latini, hissiyotini qosh,ko\u2018z, yuz muskullarining harakati bilan bayon qilish san\u2019ati nima deb ataladi?", "opts": ["O\u2018qituvchining mimikasi", "O\u2018qituvchining pantomimikasi", "O\u2018qituvchining dilkashligi", "O\u2018qituvchining aktyorlik mahorati"], "a": 0}, {"n": 10, "q": "O\u2018qituvchining yoshi, jinsi, mijozi, fe\u2019l-atvori, salomatligi kabi xususiyatlariga bog\u2018liq pedagogik texnika qanday nomlanadi?", "opts": ["Kreativ pedagogik texnika", "Kompetentli pedagogik texnika", "Individual pedagogik texnika", "Jamoaviy pedagogik texnika"], "a": 2}, {"n": 11, "q": "Insonning atrof-dagi odamlar bilan barqaror, yaqin munosabatda bo\u2018lishga intilishi..", "opts": ["Muosharat odobi", "Kommunikativ qobiliyat", "Muloqot madaniyati", "O\u2018qituvchining dilkashligi"], "a": 3}, {"n": 12, "q": "Ongli ravishda yuzaga keltirilgan pedagogik vaziyat bosqichlarini oldindan rejalashtirish nima?", "opts": ["Pedagogik mahorat", "Kreativlik", "Pedagogik texnika", "Konstruktiv qobiliyat"], "a": 3}, {"n": 13, "q": "Nutqda o\u2018rni bo\u2018lmagan vaziyatlarda rasmiy so\u2018zlardan foydalanish nima deyiladi?", "opts": ["Vulgarizm", "Jargon", "Kanselyarizm", "Varvarizm"], "a": 2}, {"n": 14, "q": "Tembr -", "opts": ["Noto\u2018g\u2018ri diksiya, so\u2018zlarni noo\u2018rin qo\u2018llash, til qoidalarini buzish.", "Tovushning yoqimliligi, jarangdorligi", "Monotonlik, temporitmning oshib ketishi", "Tovush rangdorligi, yorqinligi hamda uning yoqimliligi va alohidaligidir"], "a": 3}, {"n": 15, "q": "Imij (inglizcha image) so\u2018zining ma\u2019nosi nima?", "opts": ["\u201cSiymo\u201d, \u201cTimsol\u201d, \u201cQiyofa\u201d \u201cTasvir\u201d, \u201cObraz\u201d", "\u201cSiymo\u201d, \u201cQiyofa\u201d", "\u201cQiyofa\u201d \u201cTasvir\u201d, \u201cObraz\u201d", "\u201cTimsol\u201d, \u201cTasvir\u201d, \u201cObraz\u201d"], "a": 0}, {"n": 16, "q": "Bugungi kunda zamonaviy o\u2018qituvchining kompetentligini shartli ravishda qanday turlarga ajratish mumkin?", "opts": ["O\u2018qituvchining umuminsoniy, madaniy kompe-tensiyalariga", "O\u2018qituvchining kasbiy, shaxsiy, umuminsoniy, madaniy kompetensiyalariga", "O\u2018qituvchining kasbiy va shaxsiy kompe-tensiyalariga", "O\u2018qituvchining kasbiy, shaxsiy, madaniy kompetensiyalariga"], "a": 1}, {"n": 17, "q": "\u201cKompetensiya \u2013 bilim, ko\u2018nikma, mala-ka, qadriyat, boshqa shaxsiy sifatlar, ijobiy natijalar-ni faoliyatdagi ko\u2018rinishidir\u201d. Bu fikr qaysi o\u2018zbek olimiga tegishli?", "opts": ["N.Muslimov", "X.Ibragimov", "Sh.Mardonov", "M.Ochilov"], "a": 3}, {"n": 18, "q": "Pedagogik kompetentlik deganda nima tushuniladi?", "opts": ["Pedagog shaxsi, uning tajribasi va kasbiy faoliyatidagi individuallikning yorqin ko\u2018rinishi", "Pedagogik faoliyatning yuksak darajada rivojlanishi, pedagogning individualligi", "Yuksak darajadagi pedagogik faoliyatning taraqqiy etishi, pedagogik texnikani egallashi, pedagogning tajribasi va kasbiy faoliyatidagi individualligi", "Pedagogik texnikani egallashi va pedagogning shaxsiy tajribasi"], "a": 2}, {"n": 19, "q": "Nutqning madaniyligini ta\u2019minlaydigan qanday kommunikativ sifatlar mavjud?", "opts": ["To\u2018g\u2018rilik, mantiqiylik, ifodalilik, boylik, jo\u2018yalilik", "To\u2018g\u2018rilik, aniqlik, mantiqiylik, soflik, jo\u2018yalilik", "To\u2018g\u2018rilik, mantiqiylik, ifodalilik, boylik, jo\u2018yalilik", "To\u2018g\u2018rilik, aniqlik, mantiqiylik, ifodalilik, boylik, soflik, jo\u2018yalilik"], "a": 3}, {"n": 20, "q": "Kommunikativ nutqning sofligini ta\u2019minlamaydigan, nutqning adabiy til me\u2019yorlariga va jamiyatdagi ma\u2019naviy-axloq qoidalariga yot bo\u2018lgan unsurlari qaysilar?", "opts": ["Varvarizm, vulgarizm, argo, jargon, parazit so\u2018zlar", "Varvarizm, vulgarizm, sinonim jargon, parazit so\u2018zlar", "Varvarizm, vulgarizm, antonim, parazit so\u2018zlar", "Omonim, vulgarizm, argo, jargon"], "a": 0}, {"n": 21, "q": "Inson his tuyg\u2018ulari uning ......... namoyon bo\u2018ladi", "opts": ["Yuzida \u2013 yuz mushaklarini qisqarishi va bo\u2018shashishi natijasida", "Kayfiyatida", "Gavda, qo\u2018l, oyoq harakatida", "Ko\u2018zida"], "a": 0}, {"n": 22, "q": "Pedagogik improvizatsiya qaysi holatda namoyon bo\u2018ladi?", "opts": ["Kutilmagan pedagogik vaziyatda tezkor qaror qabul qilishda", "Nazorat ishlarida", "Standart vaziyatda", "Oldin tayyorlangan ssenariyga qat\u2019iy amal qilinganda"], "a": 0}, {"n": 23, "q": "Pedagogik refleksiyaning mohiyati nimadan iborat?", "opts": ["Darsni rejalashtirish", "Talabalarni tahlil qilish", "Nazorat qilish", "O\u2018qituvchining o\u2018z faoliyatini tahlil qilishi"], "a": 3}, {"n": 24, "q": "Pedagogik mahorat tushunchasi qaysi belgilar majmuasi orqali to\u2018liq ifodalanadi?", "opts": ["Metodik tayyorgarlik va nutq", "Nazorat va baholash", "Kasbiy kompetensiya, shaxsiy sifatlar, ijodkorlik", "Fanni bilish va tajriba"], "a": 2}, {"n": 25, "q": "Pedagogik texnika deganda nima tushuniladi?", "opts": ["Ta\u2019lim standartlari", "O\u2018qituvchining tashqi va ichki ta\u2019sir vositalari majmuasi", "Dars rejasi tuzish usullari", "Ilmiy tadqiqot usullari"], "a": 1}, {"n": 26, "q": "O\u2018z-o\u2018zini bilish, anglash, belgilash, rivojlantirish, nazorat qilish bu:", "opts": ["Pedagogik relaksatsiya", "Pedagogik aksiologiya", "Pedagogik refleksiya", "Pedagogik deontologiya"], "a": 2}, {"n": 27, "q": "\u201cUstoz muallimsiz qolganda zamon Nodonlikdan qora bo\u2018lardi jahon\u201d baytining muallifi kim ?", "opts": ["Abu Ali ibn Sino", "Abu Nasr Forobiy", "Abu Rayhon Beruniy", "Abdurahmon Jomiy"], "a": 3}, {"n": 28, "q": "\u201cO\u2018qituvchi muntazam fan bilan shug\u2018ullanmog\u2018i lozim, aks holda u qurigan daraxt va toshga o\u2018xshab qoladi\u201d Ushbu fikr muallifi kim ?", "opts": ["Abdulla Avloniy", "Yan Amos Komenskiy", "Adolf Disterverg", "V. A Suxomlinskiy"], "a": 2}, {"n": 29, "q": "O\u2018qituvchi o\u2018quvchilar bilan muloqot jarayonida paydo bo\u2018ladigan turli ziddiyatli vaziyatlarni bartaraf etishi uchun...", "opts": ["Ota - onasini o\u2018quv muassasasiga chaqirtirishi va suhbat o\u2018tkazib ogohlantirishi kerak", "O\u2018zi ishlayotgan o\u2018quv muassasasi rahbariyatiga yordam so\u2018rab murojaat qilishi kerak", "Avvalo o\u2018z iqtidoriga, pedagogik va psixologik mahoratiga tayanishi lozim", "Darhol tartibsiz o\u2018quvchini topib unga nisbatan tarbiyaviy jazo metodini qo\u2018llashi shart"], "a": 2}, {"n": 30, "q": "Pedagogik mahoratni tizimli-funksional yondashuv asosida talqin etganda, qaysi komponent yetakchi hisoblanadi?", "opts": ["Pedagogik refleksiya", "Metodik bilimlar", "Kasbiy qadriyatlar", "Shaxsiy tajriba"], "a": 0}, {"n": 31, "q": "Pedagogik va aktyorlik faoliyatida qanday o\u2018xshashliklar bor?", "opts": ["Har ikkalasida estetik his-tuyg\u2018ular o\u2018xshash", "Aktyor sahnadagi roli orqali, pedagog turli pedagogik ta\u2019sir vositalari yordamida inson ongida oldindan ko\u2018zlangan o\u2018zgarishlarni amalga oshirishga harakat qiladilar.", "Aktyor pedagogik ta\u2019sir vositalari yordamida inson ongiga ta\u2019sir o\u2018tkazadi", "Aktyor ham pedagog ham sah-nadagi roli orqali inson ongiga ta\u2019sir o\u2018tkazadi"], "a": 1}, {"n": 32, "q": "\u201cUstoz shogirdlariga qattiq zulm ham, haddan tashqari ko\u2018ngilchanlik ham qilmasligi lozim\u201d . Ushbu fikr qaysi allomaga tegishli ?", "opts": ["Abu Nasr Forobiy", "Abu Ali ibn Sino", "Alisher Navoiy", "Abu Rayhon Beruniy"], "a": 0}, {"n": 33, "q": "\u201cUstoz muallim bo\u2018lsa beozor, Go\u2018dak eli bozorda xarsang o\u2018ynar\u201d Shayx Sa\u2019diyning ushbu bayt bilan ilgari surgan g\u2018oyasi ?", "opts": ["Ta\u2019lim berishda qat\u2019iyatlikni afzal ko\u2018rgan", "Axloqiylik va mehribonlik g\u2018oyasini ilgari surgan", "O\u2018qituvchi shirinsuxan va beozor bo\u2018lishi lozim", "Mudarris bola tarbiyasida ma\u2019naviyatli va odil bo\u2018lishi kerak"], "a": 0}, {"n": 34, "q": "Pedagogik va rejissyorlik faoliyatida qanday o\u2018xshashliklar bor?", "opts": ["Aktyor sahnadagi roli orqali, pedagog turli pedagogik ta\u2019sir vositalari yordamida inson ongida oldindan ko\u2018zlangan o\u2018zgarishlarni amalga oshirishga harakat qiladilar.", "Pedagogik va rejissyorlik faoliyatida o\u2018xshashliklar yo\u2018q", "O\u2018qituvchining o\u2018quv-tarbiyaviy mashg\u2018ulot, tadbirlar \u201csse nariy\u201dsini ishlab chiqishi, unda tinglovchilar faoliyatini boshqarishi bu kasbni rejissyor kasbiga yaqinlashtiradi.", "Rejissyor ham pedagog ham sahnadagi ssenariylar orqali inson ongiga ta\u2019sir o\u2018t : 52, "q": "Nutqning toza bo\u2018lishiga xalaqit beruvchi unsurlarni belgilang.", "opts": ["ovoz tembri", "intonatsiya", "Rezonator va diapazon", "Dialektizm va varvarizm"], "a": 3}, {"n": 53, "q": "Diksiya bu:", "opts": ["Aniq talaffuz qilish", "Baland ovozdv talaffuz qilish", "Bir maromda talaffuz qilish", "Ohista talaffuz qilish"], "a": 0}, {"n": 54, "q": "Qaysi yunon faylasufi \u201cBarcha illatlarning kelib chiqishi ilmsizlikdandir\u201d degan fikrlarni aytgan?", "opts": ["Suqrot", "Demokrit", "Arastu", "Platon"], "a": 0}, {"n": 55, "q": "Qaysi faylasuf olim  o\u2018quvchilar bilan savol-javob usuli orqali ta\u2019lim-tarbiya berishning suhbat metodiga asos solgan ?", "opts": ["Gorgiy", "Suqrot", "Demosfen", "Platon"], "a": 1}, {"n": 56, "q": "Ichki nutq -", "opts": ["O\u2018qituvchi ongida hosil bo\u2018ladigan, kishining og\u2018iz ochmasdan fikrlashi, mulo\u00adhaza yuritishi, o\u2018ylashidir.", "Kishining og\u2018iz ochmasdan real tovushlar sifatida yuzaga keladigan nutq", "Tildagi mavjud ifoda vositalaridan foydalangan holda reallikka aylangan fikr", "O\u2018qituvchi mulohazasi va fikrining til vositasida real tovushlar sifatida yuzaga keladigan nutq"], "a": 0}, {"n": 57, "q": "Qaysi qobiliyat pedagogikaning ta\u2019lim va tarbiyaviy qonuniyatlarini chuqur o\u2018zlashtirishga yordam beradi?", "opts": ["Didaktik qobiliyat", "Konstruktiv qobiliyat", "Bilish qobiliyati", "Empatik qobiliyat"], "a": 0}, {"n": 58, "q": "Bu qobiliyat talabalarning o\u2018qituvchi tomonidan turli jamoat ishlariga, to\u2018garaklarga jalb qila olishida namoyon bo\u2018ladi.", "opts": ["Empatik qobiliyat", "Anglash (tushunish) qobiliyati", "Pertseptiv qobiliyat", "Tashkilotchilik qobiliyati"], "a": 3}, {"n": 59, "q": "Pedagogik imijning tarkibiga nimalar kiradi?", "opts": ["Kasbiy mahorat, individual xususiyatlar", "Kreativlik, kasbiy mahorat, individual xususiyatlar", "Shaxsiy sifatlar, kasbiy mahorat, individual xususiyatlar", "Tashqi ko\u2018rinish, kasbiy mahorat, individual xususiyatlar"], "a": 3}, {"n": 60, "q": "O\u2018qituvchi axloqiy-ma\u2019naviy qiyofasini namoyon etuvchi me\u2019yor tuyg\u2018usi yoki xulq va odob qoidalariga rioya qilishi qanday ataladi?", "opts": ["pedagogik texnika", "Pedagogik nazokat", "Pedagogik madaniyat", "Pedagogik mahorat"], "a": 1}]</script>

<div id="home" class="sc on">
  <div class="logo">&#128218;</div>
  <h1>Pedagogik Mahorat</h1>
  <p class="sub">va Kreativligi &mdash; 60 ta rasmiy savol</p>
  <div class="card">
    <h3>Savollar soni</h3>
    <div class="pills" id="cr">
      <div class="pill" data-v="10">10 ta</div>
      <div class="pill" data-v="20">20 ta</div>
      <div class="pill" data-v="30">30 ta</div>
      <div class="pill on" data-v="60">Hammasi (60)</div>
    </div>
  </div>
  <div class="card">
    <h3>Savollar tartibi</h3>
    <div class="pills" id="or">
      <div class="pill on" data-v="seq">Ketma-ket</div>
      <div class="pill" data-v="rand">Aralash</div>
    </div>
  </div>
  <div class="card" style="margin-bottom:1.25rem">
    <h3>Statistika</h3>
    <div class="sgrid">
      <div class="sbox"><div class="n">60</div><div class="l">Jami savol</div></div>
      <div class="sbox"><div class="n" id="best">-</div><div class="l">Eng yaxshi natija</div></div>
    </div>
  </div>
  <button class="sbtn" id="s0">&#9654; Testni boshlash</button>
</div>

<div id="quiz" class="sc">
  <div class="qh">
    <button class="bb" id="bk">&#8592;</button>
    <div class="pw">
      <div class="pl" id="pt">1 / 60</div>
      <div class="pb"><div class="pf" id="pf" style="width:0%"></div></div>
    </div>
    <div class="sb" id="sc2">0</div>
  </div>
  <div class="qb">
    <div class="qn" id="qn"></div>
    <div class="qt" id="qt"></div>
    <div class="os" id="os"></div>
    <div class="fb" id="fb" style="display:none"></div>
    <button class="nb" id="nx">Keyingi &#8594;</button>
  </div>
</div>

<div id="res" class="sc">
  <div class="rc">
    <div class="ci"><div class="p" id="rp"></div><div class="s" id="rs2"></div></div>
    <div class="rt" id="rti"></div>
    <div class="rd2" id="rdi"></div>
    <div class="rsgrid">
      <div class="rv"><div class="n g" id="ro"></div><div class="l">To&#699;g&#699;ri</div></div>
      <div class="rv"><div class="n r" id="rw"></div><div class="l">Noto&#699;g&#699;ri</div></div>
      <div class="rv"><div class="n b" id="rtot"></div><div class="l">Jami</div></div>
    </div>
    <div class="brow">
      <button class="b1" id="re">&#128260; Qayta urinish</button>
      <button class="b2" id="hm">&#127968; Bosh sahifa</button>
    </div>
  </div>
</div>

<script>
var Q = JSON.parse(document.getElementById('qdata').textContent);
var LT = ['A','B','C','D'];
var pool = [], cur = 0, score = 0, answered = false;
var cfg = {count: 60, order: 'seq'};

function el(id){ return document.getElementById(id); }
function show(id){
  document.querySelectorAll('.sc').forEach(function(s){ s.classList.remove('on'); });
  el(id).classList.add('on');
  window.scrollTo(0,0);
}

document.querySelectorAll('#cr .pill').forEach(function(p){
  p.addEventListener('click', function(){
    document.querySelectorAll('#cr .pill').forEach(function(x){ x.classList.remove('on'); });
    p.classList.add('on');
    cfg.count = parseInt(p.getAttribute('data-v'));
  });
});
document.querySelectorAll('#or .pill').forEach(function(p){
  p.addEventListener('click', function(){
    document.querySelectorAll('#or .pill').forEach(function(x){ x.classList.remove('on'); });
    p.classList.add('on');
    cfg.order = p.getAttribute('data-v');
  });
});

var sv = localStorage.getItem('ptm_best');
if(sv){ el('best').textContent = sv + '%'; }

el('s0').addEventListener('click', startQ);
el('bk').addEventListener('click', function(){ show('home'); });
el('nx').addEventListener('click', nextQ);
el('re').addEventListener('click', startQ);
el('hm').addEventListener('click', function(){ show('home'); });

function startQ(){
  var arr = Q.slice();
  if(cfg.order === 'rand'){ arr.sort(function(){ return Math.random() - 0.5; }); }
  pool = arr.slice(0, cfg.count);
  cur = 0; score = 0;
  show('quiz'); draw();
}

function draw(){
  var q = pool[cur], tot = pool.length;
  answered = false;
  el('pt').textContent = (cur+1) + ' / ' + tot;
  el('pf').style.width = Math.round(cur/tot*100) + '%';
  el('sc2').textContent = score;
  el('qn').textContent = 'Savol ' + (cur+1) + ' / ' + tot;
  el('qt').textContent = q.q;
  el('fb').style.display = 'none';
  el('nx').classList.remove('on');
  var os = el('os');
  os.innerHTML = '';
  q.opts.forEach(function(opt, i){
    var btn = document.createElement('button');
    btn.className = 'opt';
    var lt = document.createElement('span'); lt.className = 'lt'; lt.textContent = LT[i];
    var tx = document.createElement('span'); tx.textContent = opt;
    btn.appendChild(lt); btn.appendChild(tx);
    btn.addEventListener('click', (function(idx){ return function(){ pick(idx); }; })(i));
    os.appendChild(btn);
  });
}

function pick(idx){
  if(answered) return;
  answered = true;
  var q = pool[cur];
  var btns = document.querySelectorAll('.opt');
  btns.forEach(function(b){ b.setAttribute('disabled',''); });
  btns[q.a].classList.add('ok');
  var fb = el('fb');
  if(idx === q.a){
    score++;
    el('sc2').textContent = score;
    fb.className = 'fb ok';
    fb.textContent = "To'g'ri javob!";
  } else {
    btns[idx].classList.add('no');
    fb.className = 'fb no';
    fb.textContent = "Noto'g'ri. To'g'ri: " + LT[q.a] + ') ' + q.opts[q.a];
  }
  fb.style.display = 'block';
  var nx = el('nx');
  nx.textContent = (cur+1 < pool.length) ? 'Keyingi' : 'Natijalar';
  nx.classList.add('on');
}

function nextQ(){ cur++; if(cur >= pool.length) showRes(); else draw(); }

function showRes(){
  var tot = pool.length, pct = Math.round(score/tot*100);
  var g = pct>=86 ? "A'lo! 🏆" : pct>=71 ? "Yaxshi! 👍" : pct>=56 ? "Qoniqarli" : "Ko'proq mashq kerak";
  el('rp').textContent = pct + '%';
  el('rs2').textContent = score + '/' + tot;
  el('rti').textContent = g;
  el('rdi').textContent = tot + " ta savoldan " + score + " tasiga to'g'ri javob berdingiz";
  el('ro').textContent = score;
  el('rw').textContent = tot - score;
  el('rtot').textContent = tot;
  var prev = localStorage.getItem('ptm_best');
  if(!prev || pct > parseInt(prev)){ localStorage.setItem('ptm_best', pct); el('best').textContent = pct + '%'; }
  show('res');
}
</script>
</body>
</html>
